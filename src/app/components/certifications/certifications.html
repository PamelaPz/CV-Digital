<section id="certifications">
  <div class="wrap">
    <div class="sec-head">
      <span class="sec-num">02</span>
      <h2>Formación</h2>
    </div>

    <div class="grid">
      <div class="edu-col">
        <span class="col-label">Educación</span>
        <div class="edu-item">
          <div class="edu-icon">🎓</div>
          <div>
            <strong>Lic. en Ingeniería de Software</strong>
            <span>Universidad Autónoma de Querétaro</span>
            <span class="year">2016 – 2020</span>
          </div>
        </div>
      </div>

      <div class="certs-col">
        <span class="col-label">Certificaciones</span>
        <ul class="certs-list">
          @for (cert of certs; track cert.name) {
            <li>
              <div class="cert-dot"></div>
              <div>
                <strong>{{ cert.name }}</strong>
                <span>{{ cert.issuer }} · {{ cert.year }}</span>
              </div>
            </li>
          }
        </ul>
      </div>
    </div>
  </div>
</section>
